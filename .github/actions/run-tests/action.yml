name: run-tests

inputs:
  env_name:
    required: true
  tests_path:
    required: true
    default: course-js-api-framework

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6

    - uses: actions/checkout@v6
      with:
        repository: mtararujs/course-js-api-framework
        path: ${{ inputs.tests_path }}

    - shell: pwsh
      run: echo "run tests ${{ inputs.env_name }}"

    - shell: pwsh
      working-directory: ${{ inputs.tests_path }}
      run: npm install

    - shell: pwsh
      working-directory: ${{ inputs.tests_path }}
      run: npm run greetings greetings_${{ inputs.env_name }}